[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "node apps/routine/dist/server.js"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"

# ── Cron trigger ──
# 8:30 AM ET = 12:30 PM UTC (EDT, Mar–Nov)
# One hour before market open — freshest pre-market data.
# In EST (Nov–Mar), shift to "30 13 * * 1-5" to stay at 8:30 AM ET.
[[cron]]
schedule = "30 12 * * 1-5"
command = "bash apps/routine/scripts/cron-trigger.sh"

# ── Intraday alert scans ──
# Hourly during market hours. UTC times assume EDT (Mar–Nov): 9:30 AM ET = 13:30 UTC,
# last scan 3:30 PM ET = 19:30 UTC. In EST (Nov–Mar), shift each by +1 hour.
[[cron]]
schedule = "30 13 * * 1-5"
command = "bash apps/routine/scripts/alert-trigger.sh"

[[cron]]
schedule = "30 14 * * 1-5"
command = "bash apps/routine/scripts/alert-trigger.sh"

[[cron]]
schedule = "30 15 * * 1-5"
command = "bash apps/routine/scripts/alert-trigger.sh"

[[cron]]
schedule = "30 16 * * 1-5"
command = "bash apps/routine/scripts/alert-trigger.sh"

[[cron]]
schedule = "30 17 * * 1-5"
command = "bash apps/routine/scripts/alert-trigger.sh"

[[cron]]
schedule = "30 18 * * 1-5"
command = "bash apps/routine/scripts/alert-trigger.sh"

[[cron]]
schedule = "30 19 * * 1-5"
command = "bash apps/routine/scripts/alert-trigger.sh"
