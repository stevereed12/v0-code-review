# Railway service config for the White80 morning routine.
# Build via the Dockerfile (Playwright base image), serve the HTTP trigger, and
# let Railway healthcheck /health.

[build]
builder = "dockerfile"
dockerfilePath = "apps/routine/Dockerfile"

[deploy]
startCommand = "node apps/routine/dist/server.js"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"

# ── Cron trigger ──
# Weekdays at 09:30 UTC = 5:30 AM EDT (Mar–Nov).
# During EST (Nov–Mar), shift this to "30 10 * * 1-5" so it stays 5:30 AM ET.
[[cron]]
schedule = "30 9 * * 1-5"
command = "bash apps/routine/scripts/cron-trigger.sh"
